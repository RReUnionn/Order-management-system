server:
  port: 8085

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mariadb://localhost:3307/payment_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
    username: user
    password: 123456
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payment-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

kafka:
  topics:
    order-confirmed: order.confirmed
    payment-completed: payment.completed
    payment-failed: payment.failed

payment:
  expiry-minutes: 15          # link thanh toán hết hạn sau 15 phút
  mock-gateway-enabled: true  # dùng mock gateway khi dev (không cần VNPay thật)

outbox:
  scheduler:
    fixed-delay: 5000
