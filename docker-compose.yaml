version: '3.8'

services:
  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: order_db
      MYSQL_USER: user
      MYSQL_PASSWORD: 123456
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data: