server:
  port: 8086

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:mariadb://localhost:3307/notification_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
    username: user
    password: 123456
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

kafka:
  topics:
    order-created: order.created
    order-confirmed: order.confirmed
    order-cancelled: order.cancelled
    order-paid: order.paid
    order-shipping: order.shipping
    payment-completed: payment.completed
    payment-failed: payment.failed

websocket:
  # Redis pub/sub channel để broadcast qua nhiều instance
  redis-channel: notification:broadcast
